<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte de soporte</title>
</head>
<body style="font-family:system-ui,sans-serif;background:#f4f5f7;color:#222;padding:16px;">
  <div style="max-width:640px;margin:0 auto;background:#fff;border-radius:8px;padding:20px 24px;border:1px solid #e2e4e8;">
    <h2 style="margin:0 0 12px;font-size:18px;">Nuevo reporte — Fe y Reflexión</h2>
    <p style="margin:0 0 6px;"><strong>Contacto:</strong> {{ contact_email }}</p>
    <p style="margin:0 0 6px;"><strong>Usuario:</strong> {{ username or "—" }}</p>
    <p style="margin:0 0 16px;"><strong>Asunto:</strong> {{ asunto }}</p>
    <hr style="border:none;border-top:1px solid #eee;margin:16px 0;">
    <pre style="white-space:pre-wrap;font-family:inherit;font-size:14px;margin:0;">{{ descripcion }}</pre>
  </div>
</body>
</html>
